{% extends 'base.html' %}

{% block title %}Book Free Demo - Naman Home Tutors{% endblock %}

{% block content %}
<section class="bg-gray-50 py-16">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8" data-aos="fade-up">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="bg-brandgreen py-8 px-10 text-center text-white relative">
                <div class="absolute inset-0 bg-black/5"></div>
                <h1 class="text-3xl font-extrabold relative z-10">Book a Free Demo Class</h1>
                <p class="mt-2 text-brandgreen-100 relative z-10">Experience our personalized tutoring before you
                    commit.</p>
            </div>

            <div class="p-10">
                <form action="#" method="POST" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="student_name" class="block text-sm font-medium text-gray-700 mb-1">Student
                                Name</label>
                            <input type="text" id="student_name" name="student_name"
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brandgreen focus:border-brandgreen transition-colors"
                                placeholder="e.g. Rahul Sharma" required>
                        </div>
                        <div>
                            <label for="class" class="block text-sm font-medium text-gray-700 mb-1">Class</label>
                            <select id="class" name="class"
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brandgreen focus:border-brandgreen transition-colors"
                                required>
                                <option value="" disabled selected>Select Class</option>
                                <option value="1">Class 1</option>
                                <option value="2">Class 2</option>
                                <option value="3">Class 3</option>
                                <option value="4">Class 4</option>
                                <option value="5">Class 5</option>
                                <option value="6">Class 6</option>
                                <option value="7">Class 7</option>
                                <option value="8">Class 8</option>
                                <option value="9">Class 9</option>
                                <option value="10">Class 10</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">Subject
                                Required</label>
                            <select id="subject" name="subject"
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brandgreen focus:border-brandgreen transition-colors"
                                required>
                                <option value="" disabled selected>Select Subject</option>
                                <option value="Mathematics">Mathematics</option>
                                <option value="Science">Science</option>
                                <option value="English">English</option>
                                <option value="Social Studies">Social Studies</option>
                                <option value="Hindi">Hindi</option>
                                <option value="Marathi">Marathi</option>
                                <option value="All Subjects">All Subjects</option>
                            </select>
                        </div>
                        <div>
                            <label for="area" class="block text-sm font-medium text-gray-700 mb-1">Area / Location in
                                Pune</label>
                            <input type="text" id="area" name="area"
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brandgreen focus:border-brandgreen transition-colors"
                                placeholder="e.g. Kharadi" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Parent Phone
                                Number</label>
                            <input type="tel" id="phone" name="phone"
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brandgreen focus:border-brandgreen transition-colors"
                                placeholder="+91" required>
                        </div>
                        <div>
                            <label for="time" class="block text-sm font-medium text-gray-700 mb-1">Preferred Time for
                                Demo</label>
                            <input type="time" id="time" name="time"
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brandgreen focus:border-brandgreen transition-colors"
                                required>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit"
                            class="w-full flex justify-center py-4 px-4 border border-transparent rounded-full shadow-lg shadow-brandgreen/30 text-lg font-bold text-white bg-brandgreen hover:bg-[#619a35] transition-all hover:scale-[1.02] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brandgreen">
                            Book Free Demo Class
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
