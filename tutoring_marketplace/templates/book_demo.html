{% extends 'base.html' %}

{% block title %}Book Free Demo - Naman Home Tutors{% endblock %}

{% block content %}
<section class="bg-gray-50 py-16 min-h-[85vh] flex flex-col justify-center">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 w-full" data-aos="fade-up">

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 relative">

            <div class="bg-brandgreen py-8 px-10 text-center text-white relative transition-all duration-300">
                <div class="absolute inset-0 bg-black/5"></div>
                <!-- Progress Indicator -->
                <div class="flex justify-center items-center mb-4 relative z-10 gap-2">
                    <div id="dot-1" class="w-10 h-2 bg-white rounded-full transition-all duration-300"></div>
                    <div id="dot-2" class="w-4 h-2 bg-white/40 rounded-full transition-all duration-300"></div>
                </div>
                <h1 id="form-title" class="text-3xl font-extrabold relative z-10">Book a Free Demo Class</h1>
                <p id="form-subtitle" class="mt-2 text-brandgreen-100 relative z-10">Step 1: Tell us about your child's
                    requirements.</p>
            </div>

            <div class="p-8 md:p-12">
                <form action="{{ url_for('book_demo') }}" method="POST" id="registration-form" class="space-y-6">

                    <!-- ================= STEP 1: DEMO DETAILS ================= -->
                    <div id="step-1" class="block space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Class Grade *</label>
                                <select name="class_grade"
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brandgreen/50 hover:border-brandgreen/30 outline-none transition-all shadow-sm bg-gray-50 focus:bg-white"
                                    required>
                                    <option value="" disabled selected>Select Class</option>
                                    <option value="1">Class 1</option>
                                    <option value="2">Class 2</option>
                                    <option value="3">Class 3</option>
                                    <option value="4">Class 4</option>
                                    <option value="5">Class 5</option>
                                    <option value="6">Class 6</option>
                                    <option value="7">Class 7</option>
                                    <option value="8">Class 8</option>
                                    <option value="9">Class 9</option>
                                    <option value="10">Class 10</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Subject Required *</label>
                                <select name="subject"
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brandgreen/50 hover:border-brandgreen/30 outline-none transition-all shadow-sm bg-gray-50 focus:bg-white"
                                    required>
                                    <option value="" disabled selected>Select Subject</option>
                                    <option value="Mathematics">Mathematics</option>
                                    <option value="Science">Science</option>
                                    <option value="English">English</option>
                                    <option value="All Subjects">All Subjects</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Preferred Time *</label>
                                <input type="time" name="time"
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brandgreen/50 hover:border-brandgreen/30 outline-none transition-all shadow-sm bg-gray-50 focus:bg-white"
                                    required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Area in Pune *</label>
                                <input type="text" name="area" placeholder="e.g. Kharadi"
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brandgreen/50 hover:border-brandgreen/30 outline-none transition-all shadow-sm bg-gray-50 focus:bg-white"
                                    required>
                            </div>
                        </div>

                        <div class="pt-6">
                            <button type="button" onclick="goToStep2()"
                                class="w-full flex justify-center items-center gap-2 py-4 px-4 border border-transparent rounded-2xl shadow-lg shadow-brandgreen/30 text-lg font-bold text-white bg-brandgreen hover:bg-[#619a35] transition-all hover:scale-[1.02]">
                                Continue to Account Setup <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>

                    <!-- ================= STEP 2: REGISTRATION ================= -->
                    <div id="step-2" class="hidden space-y-6">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Student Name *</label>
                                <input type="text" name="student_name" placeholder="Rahul Sharma"
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brandgreen/50 outline-none shadow-sm bg-gray-50 focus:bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Parent Name *</label>
                                <input type="text" name="parent_name" placeholder="Mr. / Mrs. Sharma"
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brandgreen/50 outline-none shadow-sm bg-gray-50 focus:bg-white">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">School Name</label>
                                <input type="text" name="school_name" placeholder="e.g. DPS Pune"
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brandgreen/50 outline-none shadow-sm bg-gray-50 focus:bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Full Home Address *</label>
                                <input type="text" name="address" placeholder="Flat No, Society, Area"
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brandgreen/50 outline-none shadow-sm bg-gray-50 focus:bg-white">
                            </div>
                        </div>

                        <hr class="border-gray-100 my-6">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address *</label>
                                <input type="email" name="email" placeholder="email@example.com"
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brandgreen/50 outline-none shadow-sm bg-gray-50 focus:bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number *</label>
                                <div class="flex gap-2">
                                    <input type="tel" name="phone" placeholder="+91"
                                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brandgreen/50 outline-none shadow-sm bg-gray-50 focus:bg-white">
                                    <button type="button" onclick="verifyPhone(this)"
                                        class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold px-4 py-3 rounded-xl whitespace-nowrap transition-colors border border-gray-200 shadow-sm">Verify</button>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Create Username *</label>
                                <input type="text" name="username" placeholder="rahul123"
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brandgreen/50 outline-none shadow-sm bg-gray-50 focus:bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Create Password *</label>
                                <input type="password" name="password" placeholder="••••••••"
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brandgreen/50 outline-none shadow-sm bg-gray-50 focus:bg-white">
                            </div>
                        </div>

                        <hr class="border-gray-100 my-6">

                        <div>
                            <label class="block text-sm font-bold text-gray-800 mb-4">Choose Your Hero (Profile Avatar)
                                *</label>
                            <input type="hidden" name="avatar" id="avatar-input"
                                value="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix">
                            <div class="grid grid-cols-3 md:grid-cols-6 gap-4">
                                <!-- Pre-selecting the first one -->
                                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix"
                                    onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/adventurer/svg?seed=Felix')"
                                    class="avatar-option w-full aspect-square bg-gray-100 rounded-2xl cursor-pointer hover:bg-brandgreen/10 transition-all ring-4 ring-brandgreen/80 shadow-md">
                                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Luna"
                                    onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/adventurer/svg?seed=Luna')"
                                    class="avatar-option w-full aspect-square bg-gray-50 rounded-2xl cursor-pointer hover:bg-brandgreen/10 transition-all border border-gray-200 hover:border-transparent opacity-80 hover:opacity-100">
                                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Oliver"
                                    onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/adventurer/svg?seed=Oliver')"
                                    class="avatar-option w-full aspect-square bg-gray-50 rounded-2xl cursor-pointer hover:bg-brandgreen/10 transition-all border border-gray-200 hover:border-transparent opacity-80 hover:opacity-100">
                                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Bella"
                                    onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/adventurer/svg?seed=Bella')"
                                    class="avatar-option w-full aspect-square bg-gray-50 rounded-2xl cursor-pointer hover:bg-brandgreen/10 transition-all border border-gray-200 hover:border-transparent opacity-80 hover:opacity-100">
                                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Jasper"
                                    onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/adventurer/svg?seed=Jasper')"
                                    class="avatar-option w-full aspect-square bg-gray-50 rounded-2xl cursor-pointer hover:bg-brandgreen/10 transition-all border border-gray-200 hover:border-transparent opacity-80 hover:opacity-100">
                                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Coco"
                                    onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/adventurer/svg?seed=Coco')"
                                    class="avatar-option w-full aspect-square bg-gray-50 rounded-2xl cursor-pointer hover:bg-brandgreen/10 transition-all border border-gray-200 hover:border-transparent opacity-80 hover:opacity-100">
                            </div>
                        </div>

                        <div class="pt-8 flex flex-col md:flex-row gap-4">
                            <button type="button" onclick="goToStep1()"
                                class="py-4 px-8 border-2 border-gray-200 rounded-2xl font-bold text-gray-600 bg-white hover:bg-gray-50 transition-colors">
                                <i class="fas fa-arrow-left mr-2"></i> Back
                            </button>
                            <button type="submit"
                                class="flex-1 flex justify-center items-center py-4 px-4 border border-transparent rounded-2xl shadow-lg shadow-brandgreen/30 text-lg font-bold text-white bg-brandgreen hover:bg-[#619a35] transition-all hover:scale-[1.02]">
                                Complete Booking & Registration
                            </button>
                        </div>
                    </div>

                </form>

                <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                    <p class="text-sm text-gray-500">
                        Already have an account?
                        <a href="{{ url_for('login') }}"
                            class="text-brandgreen font-bold hover:underline transition-all duration-200">
                            Login here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    function goToStep2() {
        // Simple client side validation check before moving
        const selects = document.querySelectorAll('#step-1 select');
        const inputs = document.querySelectorAll('#step-1 input');

        let valid = true;
        selects.forEach(el => { if (el.required && !el.value) valid = false; el.reportValidity() });
        inputs.forEach(el => { if (el.required && !el.value) valid = false; el.reportValidity() });
        if (!valid) return;

        // Transitions
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');

        // Update dots
        document.getElementById('dot-1').className = "w-4 h-2 bg-white/40 rounded-full transition-all duration-300";
        document.getElementById('dot-2').className = "w-10 h-2 bg-white rounded-full transition-all duration-300";

        // Update headers
        document.getElementById('form-title').innerText = "Create Your Account";
        document.getElementById('form-subtitle').innerText = "Step 2: Setup your student and parent profile securely.";
    }

    function goToStep1() {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-1').classList.remove('hidden');

        document.getElementById('dot-2').className = "w-4 h-2 bg-white/40 rounded-full transition-all duration-300";
        document.getElementById('dot-1').className = "w-10 h-2 bg-white rounded-full transition-all duration-300";

        document.getElementById('form-title').innerText = "Book a Free Demo Class";
        document.getElementById('form-subtitle').innerText = "Step 1: Tell us about your child's requirements.";
    }

    function selectAvatar(element, url) {
        // Reset all avatars visually
        document.querySelectorAll('.avatar-option').forEach(el => {
            el.classList.remove('ring-4', 'ring-brandgreen/80', 'shadow-md', 'bg-gray-100');
            el.classList.add('border', 'border-gray-200', 'bg-gray-50', 'opacity-80');
        });

        // Highlight clicked avatar
        element.classList.remove('border', 'border-gray-200', 'opacity-80');
        element.classList.add('ring-4', 'ring-brandgreen/80', 'shadow-md', 'bg-gray-100');

        // Assign to hidden form submission field
        document.getElementById('avatar-input').value = url;
    }

    function verifyPhone(btn) {
        // Simulates an OTP verification click
        if (btn.innerText === "Verify") {
            btn.innerText = "Verified ✓";
            btn.classList.remove("bg-gray-100", "text-gray-700", "border-gray-200", "hover:bg-gray-200");
            btn.classList.add("bg-green-100", "text-green-700", "border-green-300");
            btn.style.pointerEvents = "none";
        }
    }
</script>
{% endblock %}
