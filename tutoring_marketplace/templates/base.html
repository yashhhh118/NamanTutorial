<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tutorials Website Courses{% endblock %}</title>
    <!-- Tailwind CSS Script -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandgreen: '#7bc143',      // approx hero bg
                        navgreen: '#8dc63f',      // Button green
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex-grow: 1;
        }
    </style>
</head>

<body class="antialiased bg-white text-gray-800">
    <!-- Navbar -->
    <nav class="bg-white sticky top-0 z-50 shadow-[0_2px_10px_rgba(0,0,0,0.05)]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-[80px]">
                <!-- Logo -->
                <a href="{{ url_for('index') }}" class="flex-shrink-0 flex items-center h-full">
                    <img src="https://www.tutorialswebsite.com/wp-content/uploads/2019/10/logo.png"
                        alt="Tutorials Website" class="h-10"
                        onerror="this.src='https://via.placeholder.com/200x50?text=Logo&bg=ffffff'">
                </a>
                <!-- Navbar Links -->
                <div class="hidden md:flex items-center space-x-6 lg:space-x-8 h-full">
                    <a href="{{ url_for('index') }}"
                        class="text-gray-800 hover:text-brandgreen font-medium flex items-center h-full border-b-[3px] border-brandgreen relative top-[1px]">Home</a>
                    <a href="#"
                        class="text-gray-600 hover:text-brandgreen font-medium flex items-center h-full border-b-[3px] border-transparent hover:border-brandgreen">Courses</a>
                    <a href="#"
                        class="text-gray-600 hover:text-brandgreen font-medium flex items-center h-full border-b-[3px] border-transparent hover:border-brandgreen">Articles</a>
                    <a href="{{ url_for('about') }}"
                        class="text-gray-600 hover:text-brandgreen font-medium flex items-center h-full border-b-[3px] border-transparent hover:border-brandgreen">About
                        Us</a>
                    <a href="{{ url_for('contact') }}"
                        class="text-gray-600 hover:text-brandgreen font-medium flex items-center h-full border-b-[3px] border-transparent hover:border-brandgreen">Contact
                        Us</a>

                    <a href="{{ url_for('login') }}"
                        class="bg-brandgreen hover:bg-green-500 text-white px-6 py-2 rounded-full font-medium transition-colors ml-4 inline-flex items-center justify-center">
                        Login/Signup
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>
</body>

</html>
